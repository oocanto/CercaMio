<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cerca mío</title>
  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="assets/favicon/favicon.ico?t=20260212054908704" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap CSS -->
    <link href="css/components/bootstrap/styles.css?t=20260212054908704" rel="stylesheet">
    <link href="css/components/bootstrap/bootstrap-icons.css?t=20260212054908704" rel="stylesheet">
    <link href="css/self_style.css?t=20260212054908704" rel="stylesheet">
    <!-- Leaflet -->
    <link rel="stylesheet" href="css/components/leaflet/leaflet.css?t=20260212054908704"/>
    <!-- Alpine.js -->
    <script src="js/components/alpine/alpine.js?t=20260212054908704" defer></script>
    <script src="js/main.js?t=20260212054908704"></script>
    <script src="js/config.js?t=20260212054908704"></script>
    <script src="js/currentLocation.js?t=20260212054908704"></script>
    <style>
        .hero {
            position: relative;
            height: 300px;
            background: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0.5rem;
            overflow: hidden;
        }
        .hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.65);
        }
        .hero-title {
            position: absolute;
            color: white;
            text-align: center;
            z-index: 2;
        }
        #map {
            height: 400px;
            width: 100%;
            border-radius: 0.5rem;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <div id="divNav"></div>
    <!-- Header -->
    <div id="divHeader"></div>

    <div class="container my-5" x-data="currentLocation()" x-init="loadData()">
        <!-- Spinner de carga -->
        <div x-show="loading" class="text-center my-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Cargando ubicación...</span>
            </div>
        </div>
    
        <!-- Cartel de error -->
        <div x-show="error && !loading" class="alert alert-danger text-center shadow-sm" role="alert">
            <span x-text="mensajeError"></span>
        </div>
    
        <!-- Contenido -->
        <div x-show="!loading && !error">
            <!-- Mapa -->
            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body p-0">
                    <div id="map" x-show="visibleMap"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div id="divFooter"></div>

    <!-- Bootstrap JS -->
    <script src="js/components/bootstrap/bootstrap.bundle.min.js?t=20260212054908704"></script>
    <!-- Leaflet JS -->
    <script src="js/components/leaflet/leaflet.js?t=20260212054908704"></script>
</body>
</html>
