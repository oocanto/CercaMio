<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="" />
        <meta name="author" content="" />
        <title>Cerca mío</title>
        <!-- Favicon -->
        <link rel="icon" type="image/x-icon" href="assets/favicon/favicon.ico?t=20260212054908704" />
        <!-- Bootstrap icons-->
        <link href="css/components/bootstrap/bootstrap-icons.css?t=20260212054908704" rel="stylesheet" />
        <!-- Core theme CSS (includes Bootstrap)-->
        <link href="css/components/bootstrap/styles.css?t=20260212054908704" rel="stylesheet" />
    </head>
    <body>
        <!-- Navigation-->
        <div id="divNav">
        </div>
        <!-- Header-->
        <div id="divHeader">
        </div>
        <!-- Section-->
        <section class="py-5">
            <div id="divForm" class="container px-4 px-lg-5 mt-5">
                <div x-data="editForm()" z-init="init()" class="container">
                    <form @submit.prevent="submit">
                            <label for="companies">Comercio:</label>
                            <select id="companies" x-model="companySelection" @change="selectedCompany = companySelection">
                                <option value="">[Seleccione una opción]</option>
                                <template x-for="company in companies" :key="company.id">
                                    <option :value="company.id" x-text="company.name"></option>
                                </template>
                            </select>

                        <div x-data ="fillCategories()">
                            <label for="categories">Rubro:</label>
                            <select id="categories" x-model="categorySelection" @change="selectedCategory = categorySelection; fillItems();">
                                <option value="">[Seleccione una opción]</option>
                                <template x-for="category in categories" :key="category.id">
                                    <option :value="category.id" x-text="category.name"></option>
                                </template>
                            </select>
                            <p>Seleccionó: <span x-text="categorySelection"></span></p>
                            <!-- Combo de Items dependientes del Rubro -->
                            <label for="items">Artículo:</label>
                            <select id="items" x-show="items.length > 0" x-model="itemSelection" @change="selectedItem = itemSelection">
                                <option value="">[Seleccione una opción]</option>
                                <template x-for="item in items" :key="item.id">
                                    <option :value="item.id" x-text="item.name"></option>
                                </template>
                            </select>
                            <p>Seleccionó: <span x-text="itemSelection"></span></p>
                        </div>
                        <div>
                            <label>Precio:</label>
                            <input id="outputPrice" type="number" step="any" x-model="outputPrice" />
                        </div>
                        <div>
                            <label>Inicio:</label>
                            <input id="startDate" type="text" placeholder="dd/MM/yyyy" x-model="startDate" />
                        </div>
                        <div>
                            <label>Fin:</label>
                            <input id="endDate" type="text" placeholder="dd/MM/yyyy" x-model="endDate" />
                        </div>
                        <div>
                            <label>Descripción corta:</label>
                            <input id="descriptionShort" type="text" x-model="descriptionShort" />
                        </div>
                        
                        <div>
                            <label>Descripción larga:</label>
                            <textarea id="descriptionLong" x-model="descriptionLong"></textarea>
                        </div>
                        
                        <div>
                            <label><input id="enabled" type="checkbox" x-model="enabled" /> Habilitado</label>
                        </div>

                        <div>
                            <label><input id="specialOffer" type="checkbox" x-model="specialOffer" /> Oferta especial</label>
                        </div>
                        <div>
                            <label>Imagen:</label>
                            <input type="file" @change="convertImage" />
                            <template x-if="image">
                                <div>
                                    <small>Imagen cargada:</small>
                                    <img :src="image" alt="Previsualización" style="max-width: 200px; display:block;">
                                </div>
                            </template>
                        </div>
    
                        <div>
                            <button type="submit" onclick="javascript: /* alert(getElementIdFromUrl(String(window.location), 'id')); */return true;">Guardar</button>
                        </div>
                    </form>
                    
                    <div x-show="errorMessage" class="error-message">
                        <p x-text="errorMessage"></p>
                    </div>
                    
                </div>
            </div>
        </section>
        <!-- Footer-->
        <div id="divFooter">
        </div>
        <!-- Bootstrap core JS-->
        <script src="js/components/bootstrap/bootstrap.bundle.min.js?t=20260212054908704"></script>
        <!-- Core theme JS-->
        <link rel="stylesheet" href="css/flatpickr.min.css?t=20260212054908704" />
        <script src="js/flatpickr.js?t=20260212054908704"></script>
        <!-- <script src="js/inputmask.min.js?t=20260212054908704"></script>
        <script src="js/dayjs.min.js?t=20260212054908704"></script>
        <script src="js/customParseFormat.js?t=20260212054908704"></script>-->
        <script src="js/components/alpine/alpine.js?t=20260212054908704" defer></script>
        <script src="js/main.js?t=20260212054908704"></script>
        <script src="js/editPublication.js?t=20260212054908704"></script>
    </body>
</html>
