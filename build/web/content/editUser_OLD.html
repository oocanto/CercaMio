<!DOCTYPE html>
<html lang="es" x-data="userForm()" x-init="init()">
<head>
  <meta charset="UTF-8">
  <title>Cerca mío</title>
  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="assets/favicon/favicon.ico?t=20260212054908704" />
</head>
<body>
  <div class="container">
    <h1 x-text="isEdit ? 'Editar Usuario' : 'Crear Usuario'"></h1>
    <form @submit.prevent="submitForm">
      <div class="grid">
        <label>Nombre <input type="text" x-model="user.name"></label>
        <label>Apellido <input type="text" x-model="user.surname"></label>
        <label>Tipo <select multiple x-model="user.type">
          <template x-for="opt in options.type" :key="opt.id">
            <option :value="opt.id" x-text="opt.name"></option>
          </template>
        </select></label>

        <label>Estado <select multiple x-model="user.status">
          <template x-for="opt in options.status" :key="opt.id">
            <option :value="opt.id" x-text="opt.name"></option>
          </template>
        </select></label>

        <label>Fecha de nacimiento <input type="date" x-model="user.birthDate"></label>

        <label>Tipo de documento <select multiple x-model="user.identificationType">
          <template x-for="opt in options.identificationType" :key="opt.id">
            <option :value="opt.id" x-text="opt.name"></option>
          </template>
        </select></label>

        <label>Número de documento <input type="text" x-model="user.identificationNumber"></label>

        <label>Género <select multiple x-model="user.gender">
          <template x-for="opt in options.gender" :key="opt.id">
            <option :value="opt.id" x-text="opt.name"></option>
          </template>
        </select></label>

        <label>Dirección <input type="text" x-model="user.address"></label>
        <label>Código postal <input type="text" x-model="user.postalCode"></label>
        <label>Info adicional dirección <input type="text" x-model="user.addressAdditionalInfo"></label>

        <label>Provincia <select multiple x-model="user.province" @change="loadDepartments">
          <template x-for="opt in options.province" :key="opt.id">
            <option :value="opt.id" x-text="opt.name"></option>
          </template>
        </select></label>

        <label>Departamento <select multiple x-model="user.department" @change="loadLocalities">
          <template x-for="opt in options.department" :key="opt.id">
            <option :value="opt.id" x-text="opt.name"></option>
          </template>
        </select></label>

        <label>Localidad <select multiple x-model="user.locality">
          <template x-for="opt in options.locality" :key="opt.id">
            <option :value="opt.id" x-text="opt.name"></option>
          </template>
        </select></label>

        <label>Email <input type="email" x-model="user.email"></label>
        <label>Teléfono fijo <input type="text" x-model="user.telephoneNumberLandline"></label>
        <label>Teléfono móvil <input type="text" x-model="user.telephoneNumberMobile"></label>
        <label>Info adicional <input type="text" x-model="user.personAdditionalInfo"></label>
        <label>Username <input type="text" x-model="user.username"></label>
        <label>Password <input type="password" x-model="user.password"></label>

        <label>Activo <select multiple x-model="user.active">
          <template x-for="opt in options.active" :key="opt.id">
            <option :value="opt.id" x-text="opt.name"></option>
          </template>
        </select></label>

        <label>Administrador <select multiple x-model="user.admin">
          <template x-for="opt in options.admin" :key="opt.id">
            <option :value="opt.id" x-text="opt.name"></option>
          </template>
        </select></label>
      </div>

      <button type="submit">Guardar</button>
    </form>
  </div>

z  <script src="js/components/alpine/alpine.js?t=20260212054908704" defer></script>
  <!--<link rel="stylesheet" href="editUser.css?t=20260212054908704">-->
  <script src="js/editUser.js?t=20260212054908704"></script>
</body>
</html>
