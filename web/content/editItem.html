<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cerca mío</title>
  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="assets/favicon/favicon.ico?t=20260212054908704" />
  <!-- Core theme CSS (includes Bootstrap) -->
  <link href="css/components/bootstrap/styles.css?t=20260212054908704" rel="stylesheet" />
</head>
<body>
  <!-- Navigation-->
  <div id="divNav"></div>
  <!-- Header-->
  <div id="divHeader"></div>
  <div class="container my-4">
    <div x-data="editionForm()" x-init="init()" class="card shadow p-4">
      <h3 class="mb-4" x-text="form.id ? 'Editar ítem' : 'Crear ítem'"></h3>
      <input type="hidden" x-model="form.id" />

      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Nombre</label>
          <input type="text" class="form-control" x-model="form.name">
        </div>

        <div class="col-md-6">
          <label class="form-label">Descripción</label>
          <input type="text" class="form-control" x-model="form.description">
        </div>

        <div class="col-md-6">
          <label class="form-label">Tipo</label>
          <select class="form-select" x-model="form.idItemType">
            <option disabled value="">Seleccione</option>
            <template x-for="item_type in item_types" :key="item_type.id">
              <option :value="item_type.id" x-text="item_type.name"></option>
            </template>
          </select>
        </div>

        <div class="col-md-6">
          <label class="form-label">Estado</label>
          <select class="form-select" x-model="form.idItemStatus">
            <option disabled value="">Seleccione</option>
            <template x-for="is in item_status" :key="is.id">
              <option :value="is.id" x-text="is.name"></option>
            </template>
          </select>
        </div>

        <div class="col-md-12">
          <label class="form-label">Imagen</label>
          <input type="file" @change="handleImage($event)" class="form-control" />
          <input type="hidden" x-model="form.image" />
          <template x-if="imagePreview">
            <div class="mt-2">
              <img :src="imagePreview" alt="Vista previa" class="img-thumbnail" style="max-height:150px;" />
              <button type="button" class="btn btn-link text-danger p-0 ms-2" @click="imagePreview = ''; form.image = '';">Eliminar imagen</button>
            </div>
          </template>
        </div>

        <div class="col-md-12">
          <label class="form-label">Categorías</label>
          <select id="categories" x-ref multiple class="form-select"></select>
        </div>

        <div class="col-12 text-end">
          <button class="btn btn-primary" @click="submitForm()">Guardar</button>
        </div>
      </div>
    </div>
  </div>
  <!-- Footer-->
  <div id="divFooter"></div>
  
  <!-- Bootstrap core JS-->
  <script src="js/components/bootstrap/bootstrap.bundle.min.js?t=20260212054908704"></script>
  <link rel="stylesheet" href="css/components/tom-select/tom-select.css?t=20260212054908704" />
  <script src="js/components/tom-select/tom-select.complete.min.js?t=20260212054908704"></script>
  <script src="js/components/imask/imask.js?t=20260212054908704"></script>
  <script src="js/components/alpine/alpine.js?t=20260212054908704" defer></script>
  <script src="js/main.js?t=20260212054908704"></script>
  <script src="js/config.js?t=20260212054908704"></script>
  <script src="js/config_component.js?t=20260212054908704"></script>
  <script src="js/editItem.js?t=20260212054908704"></script>
</body>
</html>
