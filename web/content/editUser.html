<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cerca mío</title>
  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="assets/favicon/favicon.ico?t=20260212054908704" />
  <!--<link href="css/components/bootstrap/bootstrap.min.css?t=20260212054908704" rel="stylesheet">-->
  <!-- Core theme CSS (includes Bootstrap)-->
  <link href="css/components/bootstrap/styles.css?t=20260212054908704" rel="stylesheet" />
</head>
<body>
  <!-- Navigation-->
  <div id="divNav"></div>
  <!-- Header-->
  <!--<div id="divHeader"></div>-->
  <div class="container my-4">
    <div x-data="editionForm()" x-init="init()" class="card shadow p-4">
      <h3 class="mb-4" x-text="form.id ? 'Editar usuario' : 'Crear usuario'"></h3>
      <input type="hidden" x-model="form.id" />

      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Nombre</label>
          <input type="text" class="form-control" x-model="form.name">
        </div>
        <div class="col-md-6">
          <label class="form-label">Apellido</label>
          <input type="text" class="form-control" x-model="form.surname">
        </div>

        <div class="col-md-6">
          <label class="form-label">Tipo</label>
          <select class="form-select" x-model="form.idPersonType">
            <option disabled value="">Seleccione</option>
            <template x-for="person_type in person_types" :key="person_type.id">
              <option :value="person_type.id" x-text="person_type.name"></option>
            </template>
          </select>
        </div>
        <!--
        <div class="col-md-6">
          <label class="form-label">Estado</label>
          <select class="form-select" x-model="form.idPersonStatus">
            <option disabled value="">Seleccione</option>
            <template x-for="ps in person_status" :key="ps.id">
              <option :value="ps.id" x-text="ps.name"></option>
            </template>
          </select>
        </div>
        -->

        <div class="col-md-6">
          <label class="form-label">Fecha de nacimiento</label>
          <input type="text" class="form-control" id="birthDate" placeholder="dd/MM/yyyy" x-model="form.birthDate">
        </div>

        <div class="col-md-6">
          <label class="form-label">Tipo de Identificación</label>
          <select class="form-select" x-model="form.idIdentificationType">
            <option disabled value="">Seleccione</option>
            <template x-for="identification_type in identification_types" :key="identification_type.id">
              <option :value="identification_type.id" x-text="identification_type.name"></option>
            </template>
          </select>
        </div>

        <div class="col-md-6">
          <label class="form-label">Número de Identificación</label>
          <input type="text" class="form-control" x-model="form.identificationNumber">
        </div>

        <div class="col-md-6">
          <label class="form-label">Género</label>
          <select class="form-select" x-model="form.idGender">
            <option disabled value="">Seleccione</option>
            <template x-for="gender in genders" :key="gender.id">
              <option :value="gender.id" x-text="gender.name"></option>
            </template>
          </select>
        </div>

        <div class="col-12">
          <label class="form-label">Dirección</label>
          <input type="text" class="form-control" x-model="form.address">
        </div>
        <div class="col-md-4">
          <label class="form-label">Código Postal</label>
          <input type="text" class="form-control" x-model="form.postalCode">
        </div>
        <div class="col-md-8">
          <label class="form-label">Info adicional dirección</label>
          <input type="text" class="form-control" x-model="form.addressAdditionalInfo">
        </div>

        <div class="col-md-4">
          <label class="form-label">Provincia</label>
          <select class="form-select" x-model="form.idProvince" @change="onProvinceChange">
            <option disabled value="">Seleccione</option>
            <template x-for="province in provinces" :key="province.id">
              <option :value="province.id" x-text="province.name"></option>
            </template>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Departamento</label>
          <select class="form-select" x-model="form.idDepartment" @change="onDepartmentChange">
            <option disabled value="">Seleccione</option>
            <template x-for="department in departments" :key="department.id">
              <option :value="department.id" x-text="department.name"></option>
            </template>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Localidad</label>
          <select class="form-select" x-model="form.idLocality">
            <option disabled value="">Seleccione</option>
            <template x-for="locality in localities" :key="locality.id">
              <option :value="locality.id" x-text="locality.name"></option>
            </template>
          </select>
        </div>

        <div class="col-md-6">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" x-model="form.email">
        </div>
        <div class="col-md-6">
          <label class="form-label">Teléfono fijo</label>
          <input type="text" class="form-control" x-model="form.telephoneNumberLandline">
        </div>
        <div class="col-md-6">
          <label class="form-label">Teléfono móvil</label>
          <input type="text" class="form-control" x-model="form.telephoneNumberMobile">
        </div>
        <div class="col-md-6">
          <label class="form-label">Información adicional</label>
          <input type="text" class="form-control" x-model="form.personAdditionalInfo">
        </div>

        <div class="col-md-6">
          <label class="form-label">Nombre de usuario</label>
          <input type="text" class="form-control" x-model="form.username">
        </div>
        <div class="col-md-6">
          <label class="form-label">Contraseña</label>
          <input type="password" class="form-control" id="password" x-model="form.password">
        </div>

        <div class="col-md-6 d-flex align-items-center">
          <div class="form-check me-3">
            <input class="form-check-input" type="checkbox" x-model="form.active" id="active">
            <label class="form-check-label" for="active">Activo</label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" x-model="form.admin" id="admin">
            <label class="form-check-label" for="admin">Administrador</label>
          </div>
        </div>

        <div class="col-12">
          <label class="form-label">Comercios</label>
          <select id="companies" x-ref multiple class="form-select"></select>
        </div>

        <div class="col-12 text-end">
          <button class="btn btn-primary" @click="submitForm()">Guardar</button>
        </div>
      </div>
    </div>
  </div>
  <!-- Footer-->
  <div id="divFooter"></div>

  <!-- Bootstrap core JS-->
  <script src="js/components/bootstrap/bootstrap.bundle.min.js?t=20260212054908704"></script>
  <link rel="stylesheet" href="css/components/tom-select/tom-select.css?t=20260212054908704" />
  <script src="js/components/tom-select/tom-select.complete.min.js?t=20260212054908704"></script>
  <script src="js/components/imask/imask.js?t=20260212054908704"></script>
  <script src="js/components/alpine/alpine.js?t=20260212054908704" defer></script>
  <script src="js/main.js?t=20260212054908704"></script>
  <script src="js/config.js?t=20260212054908704"></script>
  <script src="js/config_component.js?t=20260212054908704"></script>
  <script src="js/editUser.js?t=20260212054908704"></script>
</body>
</html>
