<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cerca mío</title>
  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="assets/favicon/favicon.ico?t=20260212054908704" />
  <script src="js/components/alpine/alpine.js?t=20260212054908704" defer></script>
  <link rel="stylesheet" href="css/components/leaflet/leaflet.css?t=20260212054908704" />
  <script src="js/components/leaflet/leaflet.js?t=20260212054908704"></script>
  <style>
    #map { height: 400px; margin-bottom: 1rem; }
  </style>
</head>
<body>

<div x-data="mapaApp()" x-init="iniciar()" class="p-4">

  <div id="map"></div>

  <button @click="obtenerUbicacion()" class="bg-blue-500 text-white px-4 py-2 rounded">
    Obtener mi ubicación
  </button>

  <template x-if="ubicacionObtenida">
    <form @submit.prevent="enviarDatos()" class="mt-4">
      <label class="block mb-2">
        Descripción del lugar:
        <input type="text" x-model="descripcion" class="border p-2 w-full mt-1" required />
      </label>
      <p class="mt-2 text-gray-700">
        Coordenadas: <span x-text="latitud.toFixed(6)"></span>, <span x-text="longitud.toFixed(6)"></span>
      </p>
      <button type="submit" class="mt-4 bg-green-500 text-white px-4 py-2 rounded">
        Enviar al servidor
      </button>
    </form>
  </template>

</div>

<script>
  function mapaApp() {
    return {
      mapa: null,
      marcador: null,
      latitud: 0,
      longitud: 0,
      descripcion: '',
      ubicacionObtenida: false,

      iniciar: function() {
        this.mapa = L.map('map').setView([0, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '© OpenStreetMap',
          maxZoom: 19
        }).addTo(this.mapa);
      },

      obtenerUbicacion: function() {
        var self = this;
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(
            function(posicion) {
              self.latitud = posicion.coords.latitude;
              self.longitud = posicion.coords.longitude;
              self.mapa.setView([self.latitud, self.longitud], 15);

              if (self.marcador) {
                self.marcador.setLatLng([self.latitud, self.longitud]);
              } else {
                self.marcador = L.marker([self.latitud, self.longitud]).addTo(self.mapa);
              }

              self.ubicacionObtenida = true;
            },
            function(error) {
              alert('No se pudo obtener la ubicación: ' + error.message);
            }
          );
        } else {
          alert('Tu navegador no soporta geolocalización.');
        }
      },

      enviarDatos: async function() {
        var location = {
          latitude: this.latitud,
          longitude: this.longitud,
          description: this.descripcion
        };
        
        var formData = new FormData();
        formData.append('latitude', location.latitud);
        formData.append('longitude', location.longitud);
        formData.append('description', location.descripcion);

        try {
          var respuesta = await fetch('https://127.0.0.1:9001/gps', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': 'Bearer ' + sessionStorage.getItem('auth_data')
            },
            body: JSON.stringify(location)
            // body: formData
            // body: JSON.stringify(formData)
          });

          if (!respuesta.ok) {
            throw new Error('Error al guardar en el servidor');
          }

          alert('Ubicación guardada correctamente.');
          this.descripcion = '';
        } catch (error) {
          alert('Error: ' + error.message);
        }
      }
    };
  }
</script>

</body>
</html>
