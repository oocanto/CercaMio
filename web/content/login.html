<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <title>Cerca mío</title>
  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="assets/favicon/favicon.ico?t=20260212054908704" />
  <!-- Bootstrap icons-->
  <link href="css/components/bootstrap/bootstrap-icons.css?t=20260212054908704" rel="stylesheet" />
  <!-- Core theme CSS (includes Bootstrap)-->
  <link href="css/components/bootstrap/styles.css?t=20260212054908704" rel="stylesheet" />
</head>
<body class="bg-light">
  <!-- Navigation-->
  <div id="divNav"></div>
  <!-- Header-->
  <div id="divHeader"></div>

  <!-- Login Section-->
  <section class="py-5">
    <div class="container d-flex justify-content-center">
      <div class="col-md-6 col-lg-4">
        <div class="card shadow-sm border-0 rounded-3">
          <div class="card-body p-4">
            <h3 class="card-title text-center mb-4">Iniciar sesión</h3>

            <div x-data="loginForm()">
              <form @submit.prevent="login" class="needs-validation">
                <div class="mb-3">
                  <label for="username" class="form-label">Nombre de usuario</label>
                  <input type="text" id="username" x-model="username" placeholder="Escriba su nombre de usuario" required class="form-control">
                </div>

                <div class="mb-3">
                  <label for="password" class="form-label">Contraseña</label>
                  <input type="password" id="password" x-model="password" placeholder="Escriba su contraseña" required class="form-control">
                </div>

                <div class="mb-3" x-data="fillInstances()">
                  <label for="options" class="form-label">Compañía</label>
                  <select id="options" x-model="selection" @change="selectedCompany = selection" class="form-select" required>
                    <option value="" disabled selected>[Seleccione una opción]</option>
                    <template x-for="option in options" :key="option.key">
                      <option :value="option.key" x-text="option.name"></option>
                    </template>
                  </select>
                </div>

                <div class="d-grid">
                  <button type="submit" class="btn btn-primary">
                    <i class="bi bi-box-arrow-in-right"></i> Iniciar sesión
                  </button>
                </div>
              </form>

              <!-- Mensajes de error -->
              <div x-show="errorMessage" class="alert alert-danger mt-3" role="alert">
                <p class="mb-0" x-text="errorMessage"></p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer-->
  <div id="divFooter"></div>

  <!-- Bootstrap core JS-->
  <script src="js/components/bootstrap/bootstrap.bundle.min.js?t=20260212054908704"></script>
  <script src="js/components/alpine/alpine.js?t=20260212054908704" defer></script>
  <script src="js/main.js?t=20260212054908704"></script>
  <script src="js/config.js?t=20260212054908704"></script>
  <script src="js/login.js?t=20260212054908704"></script>
</body>
</html>
